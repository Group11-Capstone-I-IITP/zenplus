{% extends "layout.html" %}

{% block title %}
Contact
{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
{% endblock %}

{% block main %}
<div class="contact-box">

<h1>Contact Us</h1>

<p>If you have any questions about ZenPluse, feel free to contact us.</p>

<form action="/contact" method="post">

<input type="text" autocomplete="off" autofocus placeholder="Your Name" name="name" required>

<input type="email" autocomplete="off" placeholder="Your Email" name="email" required>

<textarea rows="4" autocomplete="off" placeholder="Your Message" name="message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

{% endblock %}
