{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block styles %}
<!-- pulled css from static/css -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block main %}
<div class="register-wrapper">
    <div class="container">
        <h2>Registration Form</h2>
        
        <form action="/register" method="post">
            <!-- added action and method to connect app.py -->
            <!-- added name to connect app.py -->
            <input type="text" autocomplete="off" name="first_name" placeholder="First Name" required=""><br>
            <input type="text" autocomplete="off" name="last_name" placeholder="Last Name" required=""><br>
            <input type="text" autocomplete="off" name="username" placeholder="Username" required=""><br>
            <input type="password" name="password" placeholder="Password" required=""><br>
            <input type="password" name="confirmation" placeholder="Confirm Password" required=""><br>
            <button type="submit">Register</button>
        </form>
    </div>
</div>
{% endblock %}
